name: Version

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  version:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: write
    uses: qol-tools/qol-cicd/.github/workflows/lib-version.yml@main
    with:
      cargo_manifest: Cargo.toml
      tag_prefix: v
    secrets: inherit
